<!-- ./Pictures/backpack.svg -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背包主體 -->
  <path d="M70 60 Q 100 40, 130 60 L120 150 Q 100 170, 80 150 Z" 
        fill="#8d6e63" stroke="#5d4037" stroke-width="3"/>
  <!-- 背帶 -->
  <path d="M90 60 L80 40 L120 40 L110 60" fill="none" stroke="#5d4037" stroke-width="3"/>
  <!-- 胸扣 -->
  <circle cx="100" cy="55" r="4" fill="#a5d6a7" stroke="#2e5d3f" stroke-width="1"/>
  <!-- 側袋 -->
  <path d="M75 100 Q 70 110, 75 120 Q 85 120, 85 110 Q 85 100, 75 100 Z" 
        fill="#a5d6a7" stroke="#2e5d3f" stroke-width="2"/>
  <!-- 登山杖（掛側） -->
  <line x1="125" y1="90" x2="145" y2="130" stroke="#2e5d3f" stroke-width="3" stroke-linecap="round"/>
</svg>