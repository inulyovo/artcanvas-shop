<!-- ./Pictures/cooker.svg -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 爐具主體 -->
  <rect x="70" y="110" width="60" height="30" rx="8" fill="#8d6e63" stroke="#5d4037" stroke-width="2"/>
  <!-- 爐頭 -->
  <circle cx="100" cy="100" r="20" fill="#a5d6a7" stroke="#2e5d3f" stroke-width="2"/>
  <!-- 火焰 -->
  <path d="M90 85 Q 100 60, 110 85 Q 105 75, 100 65 Q 95 75, 90 85" 
        fill="#ff9800" opacity="0.8"/>
  <circle cx="100" cy="70" r="4" fill="#ff5722"/>
  <!-- 鍋子 -->
  <ellipse cx="100" cy="65" rx="25" ry="8" fill="none" stroke="#2e5d3f" stroke-width="2"/>
  <line x1="75" y1="65" x2="125" y2="65" stroke="#2e5d3f" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- 小木柴（底座點綴） -->
  <rect x="92" y="140" width="16" height="6" rx="2" fill="#5d4037"/>
</svg>