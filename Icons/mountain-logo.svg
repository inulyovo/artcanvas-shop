<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 柔和陰影（可選） -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 山脈 1（後方，較淺） -->
  <path d="M20 90 L50 40 L80 90" 
        fill="none" 
        stroke="#2e5d3f" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.7"/>

  <!-- 山脈 2（中間，主山） -->
  <path d="M10 90 L60 30 L110 90" 
        fill="none" 
        stroke="#2e5d3f" 
        stroke-width="4" 
        stroke-linecap="round"/>

  <!-- 山脈 3（前方，右側小山） -->
  <path d="M70 90 L90 60 L110 90" 
        fill="none" 
        stroke="#2e5d3f" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.8"/>

  <!-- 營火（位於主山頂） -->
  <g transform="translate(60, 32)">
    <!-- 火苗 -->
    <path d="M0 -6 Q -3 -12, 0 -16 Q 3 -12, 0 -6 Q 4 -10, 0 -16 Q -4 -10, 0 -6" 
          fill="#a5d6a7" 
          opacity="0.9"/>
    <!-- 火心 -->
    <circle cx="0" cy="-12" r="2" fill="#8bc34a"/>
    <!-- 木柴底座 -->
    <rect x="-5" y="-2" width="10" height="6" rx="1" fill="#5d4037"/>
  </g>
</svg>